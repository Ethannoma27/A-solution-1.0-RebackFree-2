<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pastebox Chat</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
/* =======================
   全局
======================= */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f5f7fb;
  height: 100vh;
  display: flex;
  justify-content: center;
}

/* =======================
   主容器
======================= */
.container {
  width: 100%;
  max-width: 520px;
  height: 100vh;
  background: white;
  display: flex;
  flex-direction: column;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* =======================
   标题
======================= */
.header {
  padding: 14px;
  text-align: center;
  font-weight: bold;
  border-bottom: 1px solid #eee;
}

/* =======================
   消息区（核心滚动区）
======================= */
#output {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  background: #f9fafb;
}

/* 消息气泡 */
.msg {
  padding: 10px;
  margin-bottom: 10px;
  background: white;
  border-radius: 10px;
  border: 1px solid #eee;
  white-space: pre-wrap;
}

/* =======================
   输入区（固定底部）
======================= */
.input-area {
  padding: 10px;
  border-top: 1px solid #eee;
  background: white;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* 输入框 */
textarea {
  width: 100%;
  height: 80px;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 10px;
  resize: none;
  font-size: 14px;
  font-family: inherit;
  outline: none;
}

/* 按钮 */
button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
}

.send {
  background: #4f8cff;
  color: white;
}

.copy {
  background: #10b981;
  color: white;
}

.copy-format {
  background: #f59e0b;
  color: white;
}

/* 状态 */
.status {
  text-align: center;
  font-size: 12px;
  color: #666;
} 

.msg {
  position: relative;
}

/* 右上角按钮容器 */
.msg-actions {
  position: absolute;
  top: 6px;
  right: 6px;
  display: flex;
  gap: 6px;
}

/* 按钮样式 */
.msg-btn {
  font-size: 11px;
  border: none;
  padding: 2px 6px;
  border-radius: 6px;
  cursor: pointer;
  background: #f3f4f6;
}

.msg-btn:hover {
  background: #e5e7eb;
} 
</style>
</head>

<body>

<div class="container">

  <!-- 顶部 -->
  <div class="header">📋 Pastebox Chat</div>

  <!-- 消息区 -->
  <div id="output"></div>

  <!-- 输入区（固定底部） -->
  <div class="input-area">

    <textarea id="input" placeholder="输入内容..."></textarea>

    <button class="send" onclick="send()">发送</button>


    <button class="copy" onclick="copyText()">复制</button> 

    <div class="status" id="status">初始化中...</div>

  </div>

</div>

<script>

let supabaseClient = null
let latestText = ""

document.addEventListener("DOMContentLoaded", () => {

  const URL = "https://dqmrzxltmwwtdziidqmg.supabase.co"
  const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxbXJ6eGx0bXd3dGR6aWlkcW1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNzQyNDcsImV4cCI6MjA5MzY1MDI0N30.nFrYz5XRzgfcXj3O0bnBqP9gzvDQvFypu6QgrLOGkCo"

  supabaseClient = window.supabase.createClient(URL, KEY)

  document.getElementById("status").innerText = "连接中..."

  supabaseClient
    .channel('pastebox-sync')
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'data'
    }, (payload) => {

      const text = payload.new.text
      latestText = text


      const div = document.createElement("div")
div.className = "msg"
div.innerText = text

// ===== 右上角按钮 =====
const actions = document.createElement("div")
actions.className = "msg-actions"

// 复制
const copyBtn = document.createElement("button")
copyBtn.className = "msg-btn"
copyBtn.innerText = "复制"
copyBtn.onclick = () => {
  navigator.clipboard.writeText(text)
}

// 删除
const delBtn = document.createElement("button")
delBtn.className = "msg-btn"
delBtn.innerText = "删除"
delBtn.onclick = async () => {

  const { error } = await supabaseClient
    .from('data')
    .delete()
    .eq('id', payload.new.id) // ⚠️ 注意这里

  if (error) {
    alert("删除失败")
    console.error(error)
    return
  }

  div.remove()
}

actions.appendChild(copyBtn)
actions.appendChild(delBtn)

div.appendChild(actions) 

      const output = document.getElementById("output")
      output.appendChild(div)

      // ⭐自动滚到底部（聊天核心体验）
      output.scrollTop = output.scrollHeight

      document.getElementById("status").innerText = "已同步 ✔"
    })
    .subscribe((status) => {
      document.getElementById("status").innerText =
        status === "SUBSCRIBED" ? "已连接 ✔" : "连接中..."
    })
})


// =======================
// 发送
// =======================
async function send() {

  if (!supabaseClient) return

  const input = document.getElementById("input")
  const text = input.value

  if (!text.trim()) return

  await supabaseClient
    .from('data')
    .insert([{ text }])

  input.value = ""
}


// =======================
// 复制纯文本
// =======================
function copyText() {
  if (!latestText) return alert("没有内容")
  navigator.clipboard.writeText(latestText)
  document.getElementById("status").innerText = "已复制 ✔"
}


// =======================
// 复制带格式
// =======================
function copyFormatted() {

  if (!latestText) return alert("没有内容")

  const formatted =
`📋 Pastebox Chat
────────────────
${latestText}
────────────────
时间：${new Date().toLocaleString()}`

  navigator.clipboard.writeText(formatted)
  document.getElementById("status").innerText = "已复制带格式版本 ✔"
}

</script> 



</body>
</html>
