<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>同步剪贴板</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f5f7fb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 500px;
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

h2 {
  text-align: center;
  margin-top: 0;
}

input {
  width: 100%;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.send {
  background: #4f8cff;
  color: white;
}

.copy {
  background: #10b981;
  color: white;
}

#output {
  margin-top: 15px;
  height: 220px;
  overflow-y: auto;
  background: #f9fafb;
  border: 1px solid #eee;
  border-radius: 8px;
  padding: 10px;

  white-space: pre-wrap;
}

.msg {
  padding: 8px;
  margin-bottom: 8px;
  background: white;
  border-radius: 6px;
  border: 1px solid #eee;
}

.status {
  text-align: center;
  font-size: 13px;
  color: #888;
  margin-top: 8px;
}
</style>
</head>

<body>

<div class="container">
  <h2>📋 同步剪贴板</h2>

  <input id="input" placeholder="输入内容...">
  <button class="send" onclick="send()">发送</button>

  <div id="output"></div>

  <button class="copy" onclick="copyText()">复制最新一条</button>

  <div class="status" id="status">未连接</div>
</div>

<script>
// ======================
// 🔑 填你的 Supabase
// ======================
const URL = "https://dqmrzxltmwwtdziidqmg.supabase.co"
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxbXJ6eGx0bXd3dGR6aWlkcW1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNzQyNDcsImV4cCI6MjA5MzY1MDI0N30.nFrYz5XRzgfcXj3O0bnBqP9gzvDQvFypu6QgrLOGkCo"

// 防止没填 key
if (!KEY || KEY.includes("你的")) {
  alert("请先填写 Supabase KEY")
  throw new Error("Missing KEY")
}

// 创建客户端
const supabase = window.supabase.createClient(URL, KEY)

let latestText = ""

// 状态
document.getElementById("status").innerText = "连接中..."


// ======================
// 📤 发送数据
// ======================
async function send() {
  const text = document.getElementById("input").value
  if (!text) return

  const { error } = await supabase
    .from('data')
    .insert([{ text }])

  if (error) {
    alert("发送失败：" + error.message)
    console.log(error)
    return
  }

  document.getElementById("input").value = ""
  document.getElementById("status").innerText = "发送成功 ✔"
}


// ======================
// 📡 实时监听
// ======================
supabase
  .channel('clipboard-sync')
  .on('postgres_changes', {
    event: 'INSERT',
    schema: 'public',
    table: 'data'
  }, (payload) => {

    const text = payload.new.text
    latestText = text

    const div = document.createElement("div")
    div.className = "msg"
    div.innerText = text

    const output = document.getElementById("output")
    output.appendChild(div)
    output.scrollTop = output.scrollHeight

    document.getElementById("status").innerText = "已同步 ✔"
  })
  .subscribe((status) => {
    console.log("Realtime status:", status)
  })


// ======================
// 📋 复制
// ======================
function copyText() {
  if (!latestText) {
    alert("没有内容")
    return
  }

  navigator.clipboard.writeText(latestText)
  document.getElementById("status").innerText = "已复制 ✔"
}
</script>

</body> 


</html>
