<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pastebox 同步剪贴板</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f5f7fb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 520px;
  background: white;
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 {
  text-align: center;
  margin-top: 0;
}

input {
  width: 100%;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 10px;
  font-size: 16px;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 15px;
}

.send {
  background: #4f8cff;
  color: white;
}

.copy {
  background: #10b981;
  color: white;
}

#output {
  margin-top: 15px;
  height: 220px;
  overflow-y: auto;
  background: #f9fafb;
  border: 1px solid #eee;
  border-radius: 10px;
  padding: 10px;
  white-space: pre-wrap;
}

.msg {
  padding: 8px;
  margin-bottom: 8px;
  background: white;
  border-radius: 8px;
  border: 1px solid #eee;
}

.status {
  text-align: center;
  font-size: 13px;
  color: #666;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>📋 Pastebox 剪贴板</h2>

  <input id="input" placeholder="输入内容...">
  <button class="send" onclick="send()">发送</button>

  <div id="output"></div>

  <button class="copy" onclick="copyText()">复制最新一条</button>

  <div class="status" id="status">初始化中...</div>
</div>

<script>

let supabaseClient = null
let latestText = ""

// =======================
// 初始化
// =======================
document.addEventListener("DOMContentLoaded", () => {

  const URL = "https://dqmrzxltmwwtdziidqmg.supabase.co".trim()
  const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxbXJ6eGx0bXd3dGR6aWlkcW1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNzQyNDcsImV4cCI6MjA5MzY1MDI0N30.nFrYz5XRzgfcXj3O0bnBqP9gzvDQvFypu6QgrLOGkCo"

  if (!KEY || KEY.includes("YOUR")) {
    alert("请填写 Supabase Anonymous API Key")
    return
  }

  try {
    supabaseClient = window.supabase.createClient(URL, KEY)
  } catch (err) {
    console.error(err)
    document.getElementById("status").innerText = "初始化失败"
    return
  }

  document.getElementById("status").innerText = "连接中..."

  // =======================
  // 实时监听
  // =======================
  supabaseClient
    .channel('pastebox-sync')
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'data'
    }, (payload) => {

      const text = payload.new.text
      latestText = text

      const div = document.createElement("div")
      div.className = "msg"
      div.innerText = text

      const output = document.getElementById("output")
      output.appendChild(div)
      output.scrollTop = output.scrollHeight

      document.getElementById("status").innerText = "已同步 ✔"
    })
    .subscribe((status) => {
      document.getElementById("status").innerText =
        status === "SUBSCRIBED" ? "已连接 ✔" : "连接中..."
    })
})


// =======================
// 发送
// =======================
async function send() {

  if (!supabaseClient) {
    alert("Supabase 未初始化完成")
    return
  }

  const input = document.getElementById("input")
  const text = input.value.trim()

  if (!text) return

  const { error } = await supabaseClient
    .from('data')
    .insert([{ text }])

  if (error) {
    alert("发送失败：" + error.message)
    return
  }

  input.value = ""
  document.getElementById("status").innerText = "发送成功 ✔"
}


// =======================
// 复制最新
// =======================
function copyText() {
  if (!latestText) {
    alert("没有内容")
    return
  }

  navigator.clipboard.writeText(latestText)
  document.getElementById("status").innerText = "已复制 ✔"
}

</script>

</body> 

</html>
