<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pastebox Chat</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
/* =======================
   全局
======================= */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
               "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: #f5f7fb;
  height: 100vh;
  display: flex;
  justify-content: center;
  letter-spacing: 0.2px;
  line-height: 1.6;
}

/* =======================
   主容器
======================= */
.container {
  width: 100%;
  max-width: 520px;
  height: 100vh;
  background: white;
  display: flex;
  flex-direction: column;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* =======================
   标题 + 标签切换
======================= */
.header {
  padding: 14px;
  text-align: center;
  font-weight: 600;
  border-bottom: 1px solid #eee;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.tab-switch {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.tab-btn {
  padding: 6px 14px;
  border-radius: 12px;
  border: none;
  background: #f3f4f6;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}

.tab-btn.active {
  background: #4f8cff;
  color: white;
  font-weight: 600;
}

/* =======================
   消息区
======================= */
#output {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  background: #f9fafb;
}

/* =======================
   消息气泡
======================= */
.msg {
  padding: 12px;
  margin-bottom: 12px;
  background: white;
  border-radius: 12px;
  border: 1px solid #eee;
  position: relative;
  word-break: break-word;
  overflow-wrap: anywhere;
}

.msg-content {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg-content > * {
  margin: 0;
}

.msg-content p {
  margin: 0;
  line-height: 1.65;
}

.msg-content h1,
.msg-content h2,
.msg-content h3 {
  margin: 6px 0 2px;
  font-weight: 600;
  line-height: 1.3;
}

.msg-content ul,
.msg-content ol {
  margin: 0;
  padding-left: 18px;
}

.msg-content li {
  margin: 4px 0;
  line-height: 1.55;
}

/* =======================
   输入区
======================= */
.input-area {
  padding: 10px;
  border-top: 1px solid #eee;
  background: white;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

textarea {
  width: 100%;
  height: 80px;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 10px;
  resize: none;
  font-size: 14px;
  font-family: inherit;
  outline: none;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
}

.send {
  background: #4f8cff;
  color: white;
}

.copy {
  background: #10b981;
  color: white;
}

.copy-format {
  background: #f59e0b;
  color: white;
}

.status {
  text-align: center;
  font-size: 12px;
  color: #666;
}

/* =======================
   操作按钮
======================= */
.msg-actions {
  position: absolute;
  top: 6px;
  right: 6px;
  display: flex;
  gap: 4px;
  opacity: 0.85;
  transition: opacity 0.18s ease;
  pointer-events: auto;
}

.msg-btn {
  font-size: 11px;
  border: 1px solid rgba(0, 0, 0, 0.06);
  padding: 2px 6px;
  border-radius: 7px;
  cursor: pointer;
  background: rgba(255, 255, 255, 0.65);
  color: #444;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  transition: background 0.15s ease, opacity 0.15s ease;
}
</style>
</head>

<body>

<div class="container">

  <!-- 顶部 -->
  <div class="header">
    📋 Pastebox Chat
    <div class="tab-switch">
      <!-- ⭐ 改成实际表名 data / data2 -->
      <button class="tab-btn active" onclick="switchTable('data', this)">Youtube UK</button>
      <button class="tab-btn" onclick="switchTable('data2', this)">Youtube LLC</button>
    </div>
  </div>

  <!-- 消息区 -->
  <div id="output"></div>

  <!-- 输入区 -->
  <div class="input-area">
    <textarea id="input" placeholder="输入内容..."></textarea>
    <button class="send" onclick="send()">发送</button>
    <button class="copy" onclick="copyText()">复制</button>
    <div class="status" id="status">初始化中...</div>
  </div>

</div> 

</div>

<script>

let supabaseClient = null
let latestText = ""
let msgIndex = 0
let currentTable = "data" // 默认表格

// =======================
// 队列系统
// =======================
let queue = []
let running = false

// =======================
// AI控制
// =======================
let isFirstAIInTurn = true

// =======================
// Markdown解析
// =======================
function parseMarkdown(text) {
  const lines = text.split("\n")
  const result = []
  let listBuffer = []

  function flushList() {
    if (listBuffer.length) {
      result.push(
        `<ul>${listBuffer.map(i => `<li>${i}</li>`).join("")}</ul>`
      )
      listBuffer = []
    }
  }

  for (let line of lines) {
    let l = line.trim()
    if (!l) continue

    if (l.startsWith("* ")) {
      listBuffer.push(l.replace("* ", ""))
      continue
    }

    flushList()

    if (l.startsWith("## ")) {
      result.push(`<h3>${l.replace("##", "").trim()}</h3>`)
    } else {
      result.push(`<p>${l}</p>`)
    }
  }

  flushList()
  return result.join("")
}

// =======================
// Flow结构（AI专用）
// =======================
function buildFlow(text, isAI = true) {
  if (!isAI) return [text]
  isFirstAIInTurn = false
  return [text]
}

// =======================
// 单条Flow执行（去掉打字效果）
// =======================
async function playSingleFlow(text, id, table, isAI = true) {
  const div = document.createElement("div")
  div.className = "msg"

  const isEven = (msgIndex % 2 === 0)
  div.style.background = isEven ? "#f3f4f6" : "#ffffff"
  div.style.alignSelf = isEven ? "flex-end" : "flex-start"
  div.style.maxWidth = "75%"
  div.style.marginLeft = isEven ? "auto" : "0"
  div.style.marginRight = isEven ? "0" : "auto"
  msgIndex++

  const content = document.createElement("div")
  content.className = "msg-content"
  content.innerHTML = parseMarkdown(text) // ✅ 直接显示文本
  div.appendChild(content)

  const output = document.getElementById("output")
  output.appendChild(div)
  output.scrollTop = output.scrollHeight

  // 操作按钮
  const actions = document.createElement("div")
  actions.className = "msg-actions"

  const copyBtn = document.createElement("button")
  copyBtn.className = "msg-btn"
  copyBtn.innerText = "复制"
  copyBtn.onclick = () => navigator.clipboard.writeText(text)

  const delBtn = document.createElement("button")
  delBtn.className = "msg-btn"
  delBtn.innerText = "删除"
  delBtn.onclick = async () => {
    const { error } = await supabaseClient
      .from(table)
      .delete()
      .eq('id', id)
    if (!error) div.remove()
  }

  actions.appendChild(copyBtn)
  actions.appendChild(delBtn)
  div.appendChild(actions)
}

// =======================
// 队列
// =======================
async function runQueue() {
  if (running) return
  running = true
  while (queue.length > 0) {
    const item = queue.shift()
    await playSingleFlow(item.text, item.id, item.table, item.isAI)
  }
  running = false
}

// =======================
// 入队
// =======================
function enqueue(text, id, table, isAI = true) {
  queue.push({ text, id, table, isAI })
  runQueue()
}

// =======================
// Supabase初始化
// =======================
document.addEventListener("DOMContentLoaded", async () => {
  const URL = "https://qpzelzelhyqlnhthibbp.supabase.co"
  const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwemVsemVsaHlxbG5odGhpYmJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMjkzNDcsImV4cCI6MjA5MzkwNTM0N30.maF1VUS-ogw17jB6h7HbEpU2-gzgdrx-fY4zNd0Apqc" // 🔒 建议用环境变量或 .env 隐藏

  supabaseClient = window.supabase.createClient(URL, KEY)

  const status = document.getElementById("status")
  status.innerText = "连接中..."

  // 初始拉取当前表格数据
  const { data, error } = await supabaseClient
    .from(currentTable)
    .select('*')
    .order('id', { ascending: true })

  if (!error && data) {
    data.forEach(item => enqueue(item.text, item.id, currentTable, true))
  }

  // 全局订阅支持 data / data2
  const channel = supabaseClient
    .channel('pastebox-sync-global')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'data' }, payload => {
      if (currentTable === 'data') enqueue(payload.new.text, payload.new.id, 'data', true)
      status.innerText = "已同步 ✔"
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'data2' }, payload => {
      if (currentTable === 'data2') enqueue(payload.new.text, payload.new.id, 'data2', true)
      status.innerText = "已同步 ✔"
    })

  await channel.subscribe(state => {
    status.innerText = state === "SUBSCRIBED" ? "已连接 ✔" : "连接中..."
  })
})

// =======================
// 发送消息
// =======================
async function send() {
  if (!supabaseClient) return
  const input = document.getElementById("input")
  const text = input.value
  if (!text.trim()) return
  isFirstAIInTurn = true
  await supabaseClient
    .from(currentTable)
    .insert([{ text }])
  input.value = ""
}

// =======================
// 复制文本
// =======================
function copyText() {
  if (!latestText) return
  navigator.clipboard.writeText(latestText)
}

// =======================
// 切换表格 Page1 / Page2
// =======================
async function switchTable(tableName, btnEl) {
  currentTable = tableName

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
  btnEl.classList.add('active')

  // 清空消息区和计数
  document.getElementById('output').innerHTML = ''
  msgIndex = 0
  queue = []

  // 拉取对应表格数据
  const { data, error } = await supabaseClient
    .from(currentTable)
    .select('*')
    .order('id', { ascending: true })

  if (!error && data) {
    data.forEach(item => enqueue(item.text, item.id, currentTable, true))
  }
} 
</script> 
</body> 
</html>
