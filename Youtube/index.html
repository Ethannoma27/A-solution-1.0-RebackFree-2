<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pastebox Chat</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>


/* =======================
   全局（轻微优化节奏）
======================= */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
               "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: #f5f7fb;
  height: 100vh;
  display: flex;
  justify-content: center;
  letter-spacing: 0.2px;
  line-height: 1.6;
}

/* =======================
   主容器
======================= */
.container {
  width: 100%;
  max-width: 520px;
  height: 100vh;
  background: white;
  display: flex;
  flex-direction: column;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* =======================
   标题
======================= */
.header {
  padding: 14px;
  text-align: center;
  font-weight: 600;
  border-bottom: 1px solid #eee;
}

/* =======================
   消息区
======================= */
#output {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  background: #f9fafb;
}

/* =======================
   消息气泡（关键优化）
======================= */
.msg {
  padding: 12px;
  margin-bottom: 12px;
  background: white;
  border-radius: 12px;
  border: 1px solid #eee;
  position: relative;

  word-break: break-word;
  overflow-wrap: anywhere;
}

/* =======================
   Markdown 内容（核心节奏系统）
======================= */
.msg-content {
  display: flex;
  flex-direction: column;
  gap: 10px;   /* ⭐ 核心：统一垂直节奏 */
}

/* 清除默认外边距干扰 */
.msg-content > * {
  margin: 0;
}

/* 段落 */
.msg-content p {
  margin: 0;
  line-height: 1.65;
} 


/* 标题 */
.msg-content h1,
.msg-content h2,
.msg-content h3 {
  margin: 6px 0 2px;
  font-weight: 600;
  line-height: 1.3;
}

/* 列表 */
.msg-content ul,
.msg-content ol {
  margin: 0;
  padding-left: 18px;
}

/* 列表项 */
.msg-content li {
  margin: 4px 0;
  line-height: 1.55;
}

/* =======================
   输入区
======================= */
.input-area {
  padding: 10px;
  border-top: 1px solid #eee;
  background: white;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* 输入框 */
textarea {
  width: 100%;
  height: 80px;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 10px;
  resize: none;
  font-size: 14px;
  font-family: inherit;
  outline: none;
}

/* 按钮 */
button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
}

.send {
  background: #4f8cff;
  color: white;
}

.copy {
  background: #10b981;
  color: white;
}

.copy-format {
  background: #f59e0b;
  color: white;
}

/* 状态 */
.status {
  text-align: center;
  font-size: 12px;
  color: #666;
}



/* =======================
   操作按钮容器（更轻层级）
======================= */
.msg-actions {
  position: absolute;
  top: 6px;
  right: 6px;
  display: flex;
  gap: 4px;

  opacity: 0.85;          /* ⭐ 再弱一点 */
  transition: opacity 0.18s ease;
  pointer-events: auto;
}


/* =======================
   按钮（高级轻玻璃感）
======================= */
.msg-btn {
  font-size: 11px;
  border: 1px solid rgba(0, 0, 0, 0.06);  /* ⭐ 轻边框（关键提升质感） */
  padding: 2px 6px;
  border-radius: 7px;                     /* ⭐ 更柔一点点 */

  cursor: pointer;

  background: rgba(255, 255, 255, 0.65); /* ⭐ 从“灰块”变“轻白玻璃” */
  color: #444;                            /* ⭐ 稍微柔化黑色 */

  backdrop-filter: blur(6px);            /* ⭐ 稍强一点点但仍克制 */
  -webkit-backdrop-filter: blur(6px);

  box-shadow: 0 1px 2px rgba(0,0,0,0.04); /* ⭐ 极轻浮层感 */

  transition: background 0.15s ease, opacity 0.15s ease;
} 



</style>
</head>

<body>

<div class="container">

  <!-- 顶部 -->
  <div class="header">📋 Pastebox Chat</div>

  <!-- 消息区 -->
  <div id="output"></div>

  <!-- 输入区 -->
  <div class="input-area">

    <textarea id="input" placeholder="输入内容..."></textarea>

    <button class="send" onclick="send()">发送</button>
    <button class="copy" onclick="copyText()">复制</button>

    <div class="status" id="status">初始化中...</div>

  </div>

</div>

<script>

let supabaseClient = null
let latestText = ""
let msgIndex = 0

// =======================
// ⭐ 队列系统
// =======================
let queue = []
let running = false

// =======================
// ⭐ 关键修复：控制“AI每轮只引导一次”
// =======================
let isFirstAIInTurn = true


// =======================
// ⭐ Markdown解析
// =======================
function parseMarkdown(text) {

  const lines = text.split("\n")
  const result = []
  let listBuffer = []

  function flushList() {
    if (listBuffer.length) {
      result.push(
        `<ul>${listBuffer.map(i => `<li>${i}</li>`).join("")}</ul>`
      )
      listBuffer = []
    }
  }

  for (let line of lines) {

    let l = line.trim()
    if (!l) continue

    if (l.startsWith("* ")) {
      listBuffer.push(l.replace("* ", ""))
      continue
    }

    flushList()

    if (l.startsWith("## ")) {
      result.push(`<h3>${l.replace("##", "").trim()}</h3>`)
    } else {
      result.push(`<p>${l}</p>`)
    }
  }

  flushList()
  return result.join("")
}


// =======================
// ⭐ 打字效果
// =======================
function typeText(el, text, speed = 30) {

  return new Promise(resolve => {

    let i = 0
    el.textContent = ""

    const timer = setInterval(() => {

      el.textContent += text[i]
      i++

      if (i >= text.length) {
        clearInterval(timer)
        resolve()
      }

    }, speed)
  })
}


// =======================
// ⭐ Flow结构（AI专用）
// =======================
function buildFlow(text, isAI = true) {

  if (!isAI) return [text]

  // ⭐ 取消开头引导文字
  isFirstAIInTurn = false

  return [text]
} 

// =======================
// ⭐ 单条Flow执行
// =======================
async function playSingleFlow(text, id, isAI = true) {

  const div = document.createElement("div")
  div.className = "msg"

 
// =======================
// ⭐ 顺序灰白 + 左右统一交替（最终版）
// =======================
const isEven = (msgIndex % 2 === 0)

// ⭐ 背景交替
div.style.background = isEven ? "#f3f4f6" : "#ffffff" 


// ⭐ 左右交替（关键：不再依赖 isAI）
div.style.alignSelf = isEven ? "flex-end" : "flex-start"

// ⭐ 气泡最大宽度（更像聊天）
div.style.maxWidth = "75%"

// ⭐ 防止贴边
div.style.marginLeft = isEven ? "auto" : "0"
div.style.marginRight = isEven ? "0" : "auto"

// ⭐ 计数++
msgIndex++


// =======================
// ⭐ 内容容器
// =======================
const content = document.createElement("div")
content.className = "msg-content"

div.appendChild(content)

const output = document.getElementById("output")
output.appendChild(div)

output.scrollTop = output.scrollHeight


// =======================
// ⭐ Flow执行
// =======================
const parts = buildFlow(text, isAI)

let fullText = ""

for (let i = 0; i < parts.length; i++) {

  const line = document.createElement("div")
  line.className = "msg-line"

  content.appendChild(line)

  // ⭐ 呼吸延迟
  await new Promise(r =>
    setTimeout(r, 250 + Math.random() * 500)
  )

  // ⭐ 打字效果
  await typeText(line, parts[i], 28)

  fullText += parts[i] + "\n\n"

  // ⭐ 不规则停顿
  await new Promise(r =>
    setTimeout(r, 700 + Math.random() * 1500)
  )

  output.scrollTop = output.scrollHeight
}


// =======================
// ⭐ Flow结束 → Markdown渲染
// =======================
content.innerHTML = parseMarkdown(fullText) 

  // =======================
  // ⭐ 操作按钮
  // =======================
  const actions = document.createElement("div")
  actions.className = "msg-actions"

  const copyBtn = document.createElement("button")
  copyBtn.className = "msg-btn"
  copyBtn.innerText = "复制"
  copyBtn.onclick = () => navigator.clipboard.writeText(text)

  const delBtn = document.createElement("button")
  delBtn.className = "msg-btn"
  delBtn.innerText = "删除"
  delBtn.onclick = async () => {

    const { error } = await supabaseClient
      .from('data')
      .delete()
      .eq('id', id)

    if (!error) div.remove()
  }

  actions.appendChild(copyBtn)
  actions.appendChild(delBtn)
  div.appendChild(actions)
}


// =======================
// ⭐ 队列
// =======================
async function runQueue() {

  if (running) return
  running = true

  while (queue.length > 0) {

    const item = queue.shift()

    await playSingleFlow(item.text, item.id, item.isAI)
  }

  running = false
}


// =======================
// ⭐ 入队（关键：增加 role）
// =======================
function enqueue(text, id, isAI = true) {

  queue.push({ text, id, isAI })
  runQueue()
}


// =======================
// ⭐ Supabase初始化
// =======================
document.addEventListener("DOMContentLoaded", async () => {

  const URL = "https://qpzelzelhyqlnhthibbp.supabase.co"
  const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwemVsemVsaHlxbG5odGhpYmJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMjkzNDcsImV4cCI6MjA5MzkwNTM0N30.maF1VUS-ogw17jB6h7HbEpU2-gzgdrx-fY4zNd0Apqc"

  supabaseClient = window.supabase.createClient(URL, KEY)

  const status = document.getElementById("status")
  status.innerText = "连接中..."

  const { data, error } = await supabaseClient
    .from('data')
    .select('*')
    .order('id', { ascending: true })

  if (!error && data) {
    data.forEach(item => {
      enqueue(item.text, item.id, true)
    })
  }

  supabaseClient
    .channel('pastebox-sync')
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'data'
    }, (payload) => {

      enqueue(payload.new.text, payload.new.id, true)

      status.innerText = "已同步 ✔"
    })
    .subscribe((state) => {

      status.innerText =
        state === "SUBSCRIBED"
          ? "已连接 ✔"
          : "连接中..."
    })
})


// =======================
// ⭐ 发送
// =======================
async function send() {

  if (!supabaseClient) return

  const input = document.getElementById("input")
  const text = input.value

  if (!text.trim()) return

  // ⭐ 用户发送 → 重置AI引导状态
  isFirstAIInTurn = true

  await supabaseClient
    .from('data')
    .insert([{ text }])

  input.value = ""
}


// =======================
// ⭐ 复制
// =======================
function copyText() {
  if (!latestText) return
  navigator.clipboard.writeText(latestText)
} 



</script> 

</body> 
</html>
